  - type: Features
    data:
      - name: NeuralPLexer
        description: 3D generative model that predicts protein-ligand complex structures directly
          from amino acid sequence and ligand graph inputs, reported in Nature Machine Intelligence
          with state-of-the-art docking and binding-site performance.
      - name: Enchant
        description: Multimodal transformer that predicts clinical and preclinical endpoints from
          molecular structures.
      - name: Automated Wet-Lab Integration
        description: Closed-loop coupling of AI design with high-throughput automated wet-lab
          synthesis and assay capabilities.
      - name: Brain-Penetrant Small Molecules
        description: Programs such as IAM1363 designed to cross the blood-brain barrier for CNS and
          brain-metastatic oncology indications.
  - type: Pipeline
    data:
      - name: IAM1363 (HER2)
        description: Brain-penetrant HER2 inhibitor showing anti-tumor activity in Phase 1b
          clinical trials.
      - name: IAM-K1 (KIF18A)
        description: Potential best-in-class KIF18A inhibitor for breast and ovarian cancers.
      - name: IAM-C1 (CDK2/4)
        description: Selective CDK2/4 inhibitor for HR+/HER2- metastatic breast cancer.
  - type: UseCases
    data:
      - name: AI-Driven Small-Molecule Design
        description: End-to-end design of novel small-molecule therapeutics using generative AI.
      - name: Protein-Ligand Structure Prediction
        description: Structural prediction to support hit discovery and lead optimization.
      - name: Clinical Endpoint Prediction
        description: Machine-learning prediction of preclinical and clinical endpoints to guide
          program selection.
  - type: Partnerships
    data:
      - name: Takeda
        description: Multi-year collaboration announced February 2026 to apply Iambic's AI-driven
          drug discovery platform to Takeda's small-molecule R&D in oncology, gastrointestinal, and
          inflammation. Includes an undisclosed upfront payment plus research funding, with up to
          $1.7B in development and sales milestones and royalties on resulting products.
  - type: Recognition
    data:
      - name: CNBC Disruptor 50
        description: Named to the CNBC Disruptor 50 list.
      - name: Conference Presentations
        description: Presented at industry conferences including the JPMorgan Healthcare Conference,
          Galien Forum, and AIAS.
  - type: Authentication
    data:
      - name: No Public Developer API
        description: Iambic Therapeutics does not publish a public developer API, SDK, or
          open-source platform. Engagement is through pharma partnerships and the company's
          internal R&D pipeline.
  - type: Compliance
    data:
      - name: GxP Drug Development
        description: Operates within standard pharmaceutical regulatory frameworks (GLP, GMP, GCP)
          for clinical-stage drug development.
  - type: Facilities
    data:
      - name: San Diego Headquarters
        description: Headquartered in San Diego, California with AI, computational chemistry, and
          automated wet-lab facilities.

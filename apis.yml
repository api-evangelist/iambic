name: Iambic Therapeutics
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
description: Iambic Therapeutics is a clinical-stage AI drug discovery company headquartered in
  San Diego. Its proprietary AI platform pairs the NeuralPLexer 3D generative model for
  protein-ligand structure prediction with the Enchant multimodal transformer for clinical and
  preclinical endpoint prediction, integrated with automated wet-lab capabilities. Iambic's
  clinical pipeline includes IAM1363 (HER2), IAM-K1 (KIF18A), and IAM-C1 (CDK2/4) in oncology.
  Iambic is a therapeutics developer rather than an API provider and does not publish a public
  developer API or open-source platform.
